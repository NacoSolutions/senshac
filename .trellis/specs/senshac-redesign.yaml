objective: "Implement the owner-approved redesign represented by WEB.pdf: Home has collapsed (page 1) and expanded (page 2) states, Methods has collapsed (page 3) and expanded (page 4) states, and Works follows page 5. Deliver these as editable Astro/Tina pages using structured content, R2 media, canonical multilingual routes, and production-safe integrations."
constraints:
  - WEB.pdf is a design/content reference only and is never served or parsed at runtime.
  - Home and Methods must each support the approved collapsed and expanded states; the state transition and URL/history contract must be clarified in senshac-6b88.
  - All production images, fonts, and HLS video are delivered from media.senshac.com via stable media IDs.
  - Novedades rendering consumes a curated tagged content model; the page must not depend directly on a live Instagram API response.
  - Keep Astro SSR and zero-JS-first behavior; client JavaScript is limited to necessary disclosure, carousel, and HLS interactions.
acceptance:
  - Home matches PDF page 1 when collapsed and page 2 when expanded at approved desktop/mobile viewports.
  - Methods matches PDF page 3 when collapsed and page 4 when expanded at approved desktop/mobile viewports.
  - Works matches PDF page 5 with approved project content and media.
  - Canonical multilingual routes use studio, works, and methods with tested redirects from legacy routes.
  - Novedades displays one accessible carousel filtered from approved tagged posts with deterministic ordering and an empty state.
  - Tina editing, R2 media delivery, Astro check/build, contact flow, SEO endpoints, and production smoke tests pass.

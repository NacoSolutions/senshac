objective: Preserve and evolve the Sens*Hac multilingual brand and service content according to owner-approved WEB.pdf revisions, including homepage positioning, detailed method phases and service tiers, works/projects, founder story, contact content, and curated Novedades posts.
constraints:
  - Use Spanish, Catalan, and English content consistently; owner approval is required before translating revised Spanish source copy.
  - Keep question-based headings and semantic HTML where compatible with the approved editorial design.
  - Novedades posts use structured tags, visibility, ordering, locale, destination, and R2 media fields rather than runtime Instagram scraping.
  - WEB.pdf remains a reference artifact and is not a runtime content source.
acceptance:
  - Approved homepage, methods, works, founder, contact, and project facts are represented in Tina content or tracked by a specific Seed.
  - Novedades filtering and ordering are deterministic and editor-controlled.
references:
  - .scratch/WEB.pdf
  - "https://senshac.com"

name: Nightly PageSpeed & Lighthouse Audit

on:
  schedule:
    - cron: '30 0 * * *' # Run daily at 00:30 UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  audit:
    name: Run PageSpeed Insights
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Fetch Lighthouse Scores & Log to Mulch
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          URLS=("https://senshac.com" "https://senshac.com/es/projects" "https://senshac.com/es/about")
          STRATEGIES=("mobile" "desktop")
          
          CHANGES_MADE=false
          
          for URL in "${URLS[@]}"; do
            for STRATEGY in "${STRATEGIES[@]}"; do
              echo "Running Lighthouse for $URL on $STRATEGY..."
              
              API_URL="https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=${STRATEGY}"
              if [ -n "${{ secrets.PAGESPEED_API_KEY }}" ]; then
                API_URL="${API_URL}&key=${{ secrets.PAGESPEED_API_KEY }}"
              fi
              
              RESPONSE=$(curl -s "$API_URL")
              
              PERFORMANCE=$(echo "$RESPONSE" | jq -r 'if .lighthouseResult then (.lighthouseResult.categories.performance.score * 100) else "null" end')
              ACCESSIBILITY=$(echo "$RESPONSE" | jq -r 'if .lighthouseResult then (.lighthouseResult.categories.accessibility.score * 100) else "null" end')
              BEST_PRACTICES=$(echo "$RESPONSE" | jq -r 'if .lighthouseResult then (.lighthouseResult.categories["best-practices"].score * 100) else "null" end')
              SEO=$(echo "$RESPONSE" | jq -r 'if .lighthouseResult then (.lighthouseResult.categories.seo.score * 100) else "null" end')
              
              # If API failed, jq returns 'null', log to seeds and skip
              if [ "$PERFORMANCE" == "null" ]; then
                echo "Failed to fetch data for $URL ($STRATEGY)"
                ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
                bunx @os-eco/seeds-cli@latest create \
                  --title "PageSpeed API Failure for $URL ($STRATEGY)" \
                  --type bug \
                  --priority 1 \
                  --labels "bug,performance,lighthouse" \
                  --body "The nightly PageSpeed audit failed to fetch data for $URL ($STRATEGY). Error: $ERROR_MSG\n\n[View run log]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
                CHANGES_MADE=true
                continue
              fi

              echo "::notice title=Lighthouse Scores for $URL ($STRATEGY)::Performance: ${PERFORMANCE} | Accessibility: ${ACCESSIBILITY} | Best Practices: ${BEST_PRACTICES} | SEO: ${SEO}"
              
              # Log to Mulch
              bunx @os-eco/mulch-cli@latest record frontend \
                --type observational \
                --name "Lighthouse $STRATEGY Audit: $URL" \
                --description "Nightly automated Lighthouse audit run. Perf: $PERFORMANCE, A11y: $ACCESSIBILITY, Best Practices: $BEST_PRACTICES, SEO: $SEO" \
                --tags "performance,lighthouse,nightly"
              CHANGES_MADE=true
              
              # Check threshold and open a seeds issue if below 90
              if (( $(echo "$PERFORMANCE < 90" | bc -l) )); then
                echo "Performance below 90, creating seeds issue..."
                bunx @os-eco/seeds-cli@latest create \
                  --title "Lighthouse Performance Drop on $URL ($STRATEGY)" \
                  --type bug \
                  --priority 1 \
                  --labels "performance,lighthouse,automated" \
                  --body "Automated nightly audit detected a performance drop on $URL ($STRATEGY). Score is $PERFORMANCE (Threshold: 90). Accessibility: $ACCESSIBILITY, Best Practices: $BEST_PRACTICES, SEO: $SEO."
                CHANGES_MADE=true
              fi
            done
          done
          
          if [ "$CHANGES_MADE" = true ]; then
            git add .mulch/ .seeds/
            # Check if there are actual changes before committing
            if ! git diff --cached --quiet; then
              git commit -m "chore(performance): nightly pagespeed audit logs & issue tracking [skip ci]"
              git push
            fi
          fi

      - name: Report workflow failure
        if: failure()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          bunx @os-eco/seeds-cli@latest create \
            --title "PageSpeed Nightly Workflow Failed" \
            --type bug \
            --priority 1 \
            --labels "bug,ci,lighthouse" \
            --body "The nightly PageSpeed audit workflow encountered an unexpected failure.\n\n[View run log]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
          git add .seeds/
          git commit -m "chore(seeds): log pagespeed workflow failure [skip ci]" || true
          git push || true

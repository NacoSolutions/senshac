name: Process uploaded media

on:
  repository_dispatch:
    types: [senshac-media-uploaded]
  workflow_dispatch:
    inputs:
      key:
        description: R2 object key to process
        required: true
        type: string
      dry_run:
        description: Generate a local fixture and skip R2 network operations
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: media-${{ github.event.client_payload.key || inputs.key }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nacosolutions/senshac-media-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      MEDIA_KEY: ${{ github.event.client_payload.key || inputs.key }}
      MEDIA_DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - run: bun install --frozen-lockfile

      - name: Download raw object
        if: env.MEDIA_DRY_RUN != 'true'
        run: |
          bun scripts/media/download-r2.ts \
            senshac-media-raw \
            "$MEDIA_KEY" \
            ".media-input/source.${MEDIA_KEY##*.}"

      - name: Create local image fixture
        if: env.MEDIA_DRY_RUN == 'true'
        run: |
          mkdir -p .media-input
          cat > .media-input/source.png <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900">
            <rect width="1200" height="900" fill="#111"/>
            <rect x="300" y="225" width="600" height="450" fill="#ef6b2e"/>
          </svg>
          EOF

      - name: Process object
        run: bun scripts/media/process-object.ts ".media-input/source.${MEDIA_KEY##*.}" media/processed "$MEDIA_KEY"

      - name: Upload processed assets
        if: env.MEDIA_DRY_RUN != 'true'
        run: bun scripts/media/upload-r2.ts media/processed senshac-media-prod

      - name: Verify processed fixture
        if: env.MEDIA_DRY_RUN == 'true'
        run: test -f media/processed/images/act-smoke/1200.avif

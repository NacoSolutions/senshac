name: Build Media Runner

on:
  push:
    branches:
      - main
    paths:
      - '.github/docker/Dockerfile.media-runner'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/Dockerfile.media-runner
          push: true
          tags: ghcr.io/nacosolutions/senshac-media-runner:latest

      - name: Generate and publish SBOM to Dependency Graph
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/nacosolutions/senshac-media-runner:latest
          format: spdx-json
          output-file: sbom.spdx.json
          dependency-snapshot: true

      - name: Report workflow failure
        if: failure()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          npx -y @os-eco/seeds-cli@latest create \
            --title "Workflow Failed: ${{ github.workflow }}" \
            --type bug \
            --priority 1 \
            --labels "bug,ci" \
            --body "The \`${{ github.workflow }}\` workflow encountered a failure.\n\n[View run log]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
          git add .seeds/
          git commit -m "chore(seeds): log ${{ github.workflow }} failure [skip ci]" || true
          git push || true

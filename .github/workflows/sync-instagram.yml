name: Instagram Daily Sync

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    name: Sync Instagram Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Instagram Sync
        run: bun run scripts/media/sync-instagram.ts
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: senshac-media-raw
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report workflow failure
        if: failure()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          npx -y @os-eco/seeds-cli@latest create \
            --title "Workflow Failed: ${{ github.workflow }}" \
            --type bug \
            --priority 1 \
            --labels "bug,ci" \
            --body "The \`${{ github.workflow }}\` workflow encountered a failure.\n\n[View run log]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
          git add .seeds/
          git commit -m "chore(seeds): log ${{ github.workflow }} failure [skip ci]" || true
          git push || true

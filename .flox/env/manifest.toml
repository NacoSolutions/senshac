schema-version = "1.12.0"

[install]
bun.pkg-path = "bun"
typescript-language-server.pkg-path = "typescript-language-server"
nixfmt.pkg-path = "nixfmt-rfc-style"
fd.pkg-path = "fd"
ripgrep.pkg-path = "ripgrep"
procps.pkg-path = "procps"
gnugrep.pkg-path = "gnugrep"
gcc.pkg-path = "gcc"
mulch.flake = "git+file:///home/rona/Repositories/.ru/RogerNavelsaker/nixpkg-mulch"
mulch.outputs = ["out", "ml"]
seeds.flake = "git+file:///home/rona/Repositories/.ru/RogerNavelsaker/nixpkg-seeds"
seeds.outputs = ["out", "sd"]
trellis.flake = "git+file:///home/rona/Repositories/.ru/RogerNavelsaker/nixpkg-trellis"
trellis.outputs = ["out", "tl"]
canopy.flake = "git+file:///home/rona/Repositories/.ru/RogerNavelsaker/nixpkg-canopy"
canopy.outputs = ["out", "cn"]
betterleaks.pkg-path = "betterleaks"
act.pkg-path = "act"

[vars]
NODE_ENV = "development"

[hook]
on-activate = '''
  export PATH="$FLOX_ENV_PROJECT/scripts:$PATH"
  GCC_RUNTIME_LIB="$(dirname "$(gcc -print-file-name=libstdc++.so.6)")"
  export LD_LIBRARY_PATH="$GCC_RUNTIME_LIB${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

  if [ -f package.json ] && [ ! -d node_modules ]; then
    echo "Installing dependencies..."
    bun install
  fi

  cat <<'EOF'
Senshac Development Environment

Astro + Alpine.js + HTMX + Hyperscript + UnoCSS

Quick Commands:
  dx <command>                          Run through direnv exec .
  fx <command>                          Project workflow shortcuts
  dev [start|stop|restart|status|log]   Astro dev server
  cms [start|stop|restart|status|log]   TinaCMS + Astro
  bun run build                         Build for production
  bun run preview                       Preview production build
  bun run check                         Run Astro check
  bun run deploy                        Deploy to Cloudflare Pages
  sd, ml, cn, tl                        Seeds, Mulch, Canopy, Trellis
EOF
'''

[profile]

[options]
systems = ["x86_64-linux"]
